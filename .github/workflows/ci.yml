name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Test CLI
        run: |
          npm run dev -- --help
          npm run dev -- status 2>/dev/null || true

  # Real sub-floor Node coverage for the runtime preflight guard (#734).
  # CI otherwise runs Node 22 only, so the guard's fail path — the scenario the
  # feature exists for — would never execute on the old Node it targets. We
  # build on Node 22 (reliable), then switch the runtime to a below-floor Node
  # and run the prebuilt CLI: it must print the guard message and exit non-zero
  # BEFORE reaching commander / the agent SDK. This also proves the import-time
  # ordering fix (bin/preflight.ts evaluates first) on a genuinely old runtime.
  node-floor-guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 22.x (build)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Switch to below-floor Node 20.x (keep node_modules + dist)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x

      - name: Guard fails fast on below-floor Node
        run: |
          set +e
          echo "Running on $(node --version)"
          out=$(node dist/bin/cli.js --version 2>&1)
          code=$?
          set -e
          echo "----- CLI output -----"
          echo "$out"
          echo "----- exit code: $code -----"
          if [ "$code" -eq 0 ]; then
            echo "FAIL: expected non-zero exit on below-floor Node, got 0"
            exit 1
          fi
          if ! echo "$out" | grep -q "requires Node.js"; then
            echo "FAIL: guard message not printed"
            exit 1
          fi
          echo "PASS: preflight guard fired before command logic on Node 20"

  validate-skills:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate all skills
        run: |
          echo "Validating all skills with skills-ref..."
          for skill in templates/skills/*/; do
            # Skip _shared directory (contains shared resources, not a skill)
            if [[ "$skill" == *"_shared"* ]]; then
              echo "Skipping ${skill} (shared resources)"
              continue
            fi
            echo "Validating ${skill}..."
            npx skills-ref validate "$skill"
          done
          echo "All skills validated successfully!"

      - name: Lint skill calls
        run: npm run lint:skill-calls

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  validate-plugin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x

      - name: Validate plugin.json structure
        run: |
          echo "Validating plugin.json..."

          # Check plugin.json exists
          if [ ! -f ".claude-plugin/plugin.json" ]; then
            echo "Error: .claude-plugin/plugin.json not found"
            exit 1
          fi

          # Validate JSON syntax
          if ! node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json', 'utf8'))"; then
            echo "Error: plugin.json is not valid JSON"
            exit 1
          fi

          # Check required fields
          node -e "
            const plugin = JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json', 'utf8'));
            const required = ['name', 'description'];
            const missing = required.filter(f => !plugin[f]);
            if (missing.length > 0) {
              console.error('Missing required fields:', missing.join(', '));
              process.exit(1);
            }
            console.log('Required fields present: name, description');
          "

          echo "plugin.json validated successfully!"

      - name: Check version sync
        run: |
          echo "Checking version sync between package.json and plugin.json..."

          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")

          echo "package.json version: $PKG_VERSION"
          echo "plugin.json version: $PLUGIN_VERSION"

          if [ "$PKG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "Error: Version mismatch!"
            echo "package.json: $PKG_VERSION"
            echo "plugin.json: $PLUGIN_VERSION"
            echo ""
            echo "Run the following to sync:"
            echo "  node -e \"const p=require('./.claude-plugin/plugin.json');p.version='$PKG_VERSION';require('fs').writeFileSync('./.claude-plugin/plugin.json',JSON.stringify(p,null,2)+'\\n')\""
            exit 1
          fi

          echo "Versions are in sync!"

      - name: Validate marketplace.json structure
        run: |
          echo "Validating marketplace.json..."

          # Check marketplace.json exists
          if [ ! -f ".claude-plugin/marketplace.json" ]; then
            echo "Error: .claude-plugin/marketplace.json not found"
            exit 1
          fi

          # Validate JSON syntax
          if ! node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json', 'utf8'))"; then
            echo "Error: marketplace.json is not valid JSON"
            exit 1
          fi

          # Check required fields
          node -e "
            const mp = JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json', 'utf8'));
            const required = ['name', 'plugins'];
            const missing = required.filter(f => !mp[f]);
            if (missing.length > 0) {
              console.error('Missing required fields:', missing.join(', '));
              process.exit(1);
            }
            if (!Array.isArray(mp.plugins) || mp.plugins.length === 0) {
              console.error('plugins must be a non-empty array');
              process.exit(1);
            }
            console.log('Required fields present: name, plugins');
          "

          echo "marketplace.json validated successfully!"

      - name: Verify version sync check catches mismatches (negative test)
        run: |
          echo "Testing that version sync check catches mismatches..."

          # Backup original plugin.json
          cp .claude-plugin/plugin.json .claude-plugin/plugin.json.bak

          # Create a version mismatch
          node -e "
            const fs = require('fs');
            const plugin = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json', 'utf8'));
            plugin.version = '0.0.0-test-mismatch';
            fs.writeFileSync('.claude-plugin/plugin.json', JSON.stringify(plugin, null, 2) + '\n');
          "

          # Run the sync check - it SHOULD fail
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")

          if [ "$PKG_VERSION" = "$PLUGIN_VERSION" ]; then
            echo "ERROR: Versions should not match in this test!"
            mv .claude-plugin/plugin.json.bak .claude-plugin/plugin.json
            exit 1
          fi

          echo "✓ Version mismatch correctly detected (package: $PKG_VERSION, plugin: $PLUGIN_VERSION)"

          # Restore original plugin.json
          mv .claude-plugin/plugin.json.bak .claude-plugin/plugin.json
          echo "✓ Negative test passed - version sync check works correctly"
