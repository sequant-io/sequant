name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Is this a pre-release?'
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Use Node.js 22.x
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and validate
        run: |
          npm run lint
          npm run build
          npm run validate:skills

      - name: Update version in package.json
        env:
          VERSION: ${{ inputs.version }}
        run: npm version "$VERSION" --no-git-tag-version

      - name: Sync plugin.json version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const pluginPath = './.claude-plugin/plugin.json';
            const plugin = JSON.parse(fs.readFileSync(pluginPath, 'utf8'));
            plugin.version = process.env.VERSION;
            fs.writeFileSync(pluginPath, JSON.stringify(plugin, null, 2) + '\n');
            console.log('Updated plugin.json to version ' + process.env.VERSION);
          "

      - name: Sync marketplace.json version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const mpPath = './.claude-plugin/marketplace.json';
            const mp = JSON.parse(fs.readFileSync(mpPath, 'utf8'));
            if (mp.plugins && mp.plugins[0]) {
              mp.plugins[0].version = process.env.VERSION;
            }
            fs.writeFileSync(mpPath, JSON.stringify(mp, null, 2) + '\n');
            console.log('Updated marketplace.json to version ' + process.env.VERSION);
          "

      - name: Build marketplace package
        run: npm run prepare:marketplace

      - name: Commit version bump
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to $VERSION"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
