# Example: Trigger Sequant workflow when an issue is labeled
#
# When a user adds the "sequant:assess" label to an issue, this workflow
# runs the full spec → exec → qa pipeline and creates a PR on success.
#
# Setup:
#   1. Copy this file to .github/workflows/sequant-assess.yml
#   2. Add ANTHROPIC_API_KEY to your repo's Actions secrets
#   3. Label any issue with "sequant:assess" to trigger

name: AI Assess Issue

on:
  issues:
    types: [labeled]

# Only one Sequant run per issue at a time
concurrency:
  group: sequant-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  assess:
    # Only run when the specific label is added
    if: github.event.label.name == 'sequant:assess'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: sequant-io/sequant-action@v1
        with:
          issues: ${{ github.event.issue.number }}
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
